<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysterium Quality Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1625 0%, #2d2640 100%);
            color: #e8e6f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #b8b0d0 0%, #9b8fc9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #9b8fc9;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(45, 38, 64, 0.6);
            border: 1px solid rgba(184, 176, 208, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            color: #b8b0d0;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #e8e6f0;
        }

        .stat-value.good {
            color: #86efac;
        }

        .stat-value.warning {
            color: #fde047;
        }

        .stat-value.bad {
            color: #fca5a5;
        }

        .nodes-container {
            margin-top: 30px;
        }

        .node-card {
            background: rgba(45, 38, 64, 0.6);
            border: 1px solid rgba(184, 176, 208, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(184, 176, 208, 0.2);
        }

        .node-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #b8b0d0;
        }

        .node-id {
            font-size: 0.8em;
            color: #9b8fc9;
            font-family: monospace;
        }

        .node-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .metric {
            padding: 10px;
            background: rgba(26, 22, 37, 0.4);
            border-radius: 8px;
        }

        .metric-label {
            font-size: 0.85em;
            color: #9b8fc9;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.2em;
            font-weight: bold;
        }

        .quality-score {
            color: #7dd3fc;
        }

        .uptime {
            color: #86efac;
        }

        .bandwidth {
            color: #fde047;
        }

        .last-update {
            text-align: center;
            margin-top: 20px;
            color: #9b8fc9;
            font-size: 0.9em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #9b8fc9;
        }

        .error {
            background: rgba(252, 165, 165, 0.1);
            border: 1px solid rgba(252, 165, 165, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #fca5a5;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mysterium Quality Monitor</h1>
        <div class="subtitle">Node Performance & Metrics</div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Total Nodes</div>
                <div class="stat-value" id="totalNodes">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg Quality</div>
                <div class="stat-value" id="avgQuality">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg Uptime</div>
                <div class="stat-value" id="avgUptime">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Bandwidth</div>
                <div class="stat-value" id="totalBandwidth">-</div>
            </div>
        </div>

        <div class="nodes-container" id="nodesContainer">
            <div class="loading">Loading quality data...</div>
        </div>

        <div class="last-update" id="lastUpdate"></div>
    </div>

    <script>
        const QUALITY_FILE = 'quality_latest.json';
        const REFRESH_INTERVAL = 60000; // 60 seconds

        function formatUptime(hours) {
            if (hours === null || hours === undefined) return 'N/A';
            return `${hours.toFixed(1)}h`;
        }

        function formatBandwidth(mbps) {
            if (mbps === null || mbps === undefined) return 'N/A';
            if (mbps >= 1000) {
                return `${(mbps / 1000).toFixed(2)} Gbps`;
            }
            return `${mbps.toFixed(0)} Mbps`;
        }

        function getQualityClass(quality) {
            if (quality >= 2.0) return 'good';
            if (quality >= 1.0) return 'warning';
            return 'bad';
        }

        function getUptimeClass(uptime) {
            if (uptime >= 20) return 'good';
            if (uptime >= 10) return 'warning';
            return 'bad';
        }

        async function loadQualityData() {
            try {
                const response = await fetch(QUALITY_FILE + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load quality data');
                
                const data = await response.json();
                
                if (!data || !data.nodes || data.nodes.length === 0) {
                    document.getElementById('nodesContainer').innerHTML = 
                        '<div class="error">No quality data available</div>';
                    return;
                }

                updateSummaryStats(data.nodes);
                renderNodes(data.nodes);
                
                document.getElementById('lastUpdate').textContent = 
                    `Last updated: ${new Date().toLocaleTimeString()}`;
                
            } catch (error) {
                console.error('Error loading quality data:', error);
                document.getElementById('nodesContainer').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }

        function updateSummaryStats(nodes) {
            const totalNodes = nodes.length;
            const avgQuality = nodes.reduce((sum, n) => sum + (n.quality || 0), 0) / totalNodes;
            const avgUptime = nodes.reduce((sum, n) => sum + (n.uptime_hours || 0), 0) / totalNodes;
            const totalBandwidth = nodes.reduce((sum, n) => sum + (n.bandwidth_mbps || 0), 0);

            document.getElementById('totalNodes').textContent = totalNodes;
            
            const qualityEl = document.getElementById('avgQuality');
            qualityEl.textContent = avgQuality.toFixed(2);
            qualityEl.className = 'stat-value ' + getQualityClass(avgQuality);
            
            const uptimeEl = document.getElementById('avgUptime');
            uptimeEl.textContent = formatUptime(avgUptime);
            uptimeEl.className = 'stat-value ' + getUptimeClass(avgUptime);
            
            document.getElementById('totalBandwidth').textContent = formatBandwidth(totalBandwidth);
        }

        function renderNodes(nodes) {
            const container = document.getElementById('nodesContainer');
            
            container.innerHTML = nodes.map(node => `
                <div class="node-card">
                    <div class="node-header">
                        <div class="node-name">${node.node_name || 'Unknown Node'}</div>
                        <div class="node-id">${node.identity || 'N/A'}</div>
                    </div>
                    <div class="node-metrics">
                        <div class="metric">
                            <div class="metric-label">Quality Score</div>
                            <div class="metric-value quality-score ${getQualityClass(node.quality || 0)}">
                                ${(node.quality || 0).toFixed(2)}
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Uptime (24h)</div>
                            <div class="metric-value uptime ${getUptimeClass(node.uptime_hours || 0)}">
                                ${formatUptime(node.uptime_hours)}
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Bandwidth</div>
                            <div class="metric-value bandwidth">
                                ${formatBandwidth(node.bandwidth_mbps)}
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Latency</div>
                            <div class="metric-value">
                                ${node.latency_ms ? node.latency_ms.toFixed(0) + ' ms' : 'N/A'}
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Sessions (24h)</div>
                            <div class="metric-value">
                                ${node.sessions_24h || 0}
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Earnings (24h)</div>
                            <div class="metric-value">
                                ${(node.earnings_24h || 0).toFixed(3)} MYST
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initial load
        loadQualityData();

        // Auto-refresh
        setInterval(loadQualityData, REFRESH_INTERVAL);
    </script>
</body>
</html>
